services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jotape
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jotape"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_NAME: "JotaPe Textil API"
      ENVIRONMENT: local
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: jotape
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET_KEY: "change-me"
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
