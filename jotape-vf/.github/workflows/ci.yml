name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jotape_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jotape_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt ruff
      - run: ruff check src/
      - name: Pytest (cobertura ≥ 80%)
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_NAME: jotape_test
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          JWT_SECRET_KEY: ci-test-secret
          JWT_ALGORITHM: HS256
          JWT_ACCESS_TOKEN_EXPIRES_MINUTES: "60"
        run: >
          pytest -v
          --cov=src
          --cov-config=.coveragerc
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          install: false
          working-directory: frontend
          start: npm run start
          wait-on: "http://127.0.0.1:3000"
          command: npm run cypress:run

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Stack Docker + health API
        run: bash infra/docker/tests/run-stack-health.sh
