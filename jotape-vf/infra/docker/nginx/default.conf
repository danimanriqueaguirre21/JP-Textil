upstream api_upstream {
    server api:8000;
}

upstream web_upstream {
    server web:3000;
}

server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
